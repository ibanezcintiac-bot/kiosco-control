<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscoControl - Dueño</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 15px;
            background: none;
            border: none;
            color: #7f8c8d;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .card {
            background: #f8f9fa;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .card-content {
            display: flex;
            justify-content: space-between;
        }

        .card-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 1em;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-success {
            background: #27ae60;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">Salir</button>

    <div class="container">
        <div class="header">
            <h1>🏪 Dueño</h1>
            <p>Gestión en tiempo real</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('ventas')">💰 Ventas</button>
            <button class="tab-btn" onclick="switchTab('vendedoras')">👩‍💼 Vendedoras</button>
        </div>

        <div id="dashboard" class="tab-content active">
            <h2>📊 Dashboard</h2>
            <div class="card">
                <div class="card-content">
                    <span>Total Vendido Hoy:</span>
                    <span class="card-value" id="total-hoy">$0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>Transacciones:</span>
                    <span class="card-value" id="total-trans">0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>Efectivo:</span>
                    <span class="card-value" id="total-efe">$0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>QR/Transferencia:</span>
                    <span class="card-value" id="total-dig">$0</span>
                </div>
            </div>
        </div>

        <div id="ventas" class="tab-content">
            <h2>💰 Ventas de Hoy</h2>
            <div id="lista-ventas"><p>Cargando...</p></div>
        </div>

        <div id="vendedoras" class="tab-content">
            <h2>👩‍💼 Vendedoras</h2>
            <div id="lista-vendedoras"><p>Cargando...</p></div>
        </div>
    </div>

    <script>
        let userData = null;

        async function callAPI(table, method = 'GET', data = null, query = null) {
            try {
                const response = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({table, method, data, query})
                });
                return await response.json();
            } catch(e) {
                console.error('Error:', e);
                return null;
            }
        }

        window.addEventListener('load', () => {
            userData = JSON.parse(sessionStorage.getItem('kiosco_user'));
            if (!userData || userData.rol !== 'dueño') {
                window.location.href = 'kiosco_login.html';
                return;
            }
            cargarDatos();
            setInterval(cargarDatos, 5000);
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function cargarDatos() {
            const hoy = new Date().toISOString().split('T')[0];
            const query = `cliente_id=eq.${userData.cliente_id}&fecha_venta=gte.${hoy}T00:00:00&select=*`;
            const ventas = await callAPI('ventas', 'GET', null, query);

            if (!ventas || ventas.error) {
                document.getElementById('total-hoy').textContent = '$0';
                document.getElementById('total-trans').textContent = '0';
                return;
            }

            const total = ventas.reduce((s, v) => s + v.subtotal, 0);
            const efe = ventas.filter(v => v.forma_pago === 'efectivo').reduce((s, v) => s + v.subtotal, 0);
            const dig = total - efe;

            document.getElementById('total-hoy').textContent = '$' + total.toLocaleString('es-AR');
            document.getElementById('total-trans').textContent = ventas.length;
            document.getElementById('total-efe').textContent = '$' + efe.toLocaleString('es-AR');
            document.getElementById('total-dig').textContent = '$' + dig.toLocaleString('es-AR');

            let html = '';
            ventas.forEach(v => {
                html += `<div class="item"><strong>${v.producto_id} x${v.cantidad}</strong><div style="font-size: 0.9em; color: #7f8c8d;">$${v.subtotal}</div></div>`;
            });
            document.getElementById('lista-ventas').innerHTML = html || '<p>Sin ventas</p>';

            const vendedoras = await callAPI('usuarios', 'GET', null, `cliente_id=eq.${userData.cliente_id}&rol=eq.vendedora&select=*`);
            if (vendedoras && !vendedoras.error) {
                html = '';
                vendedoras.forEach(v => {
                    html += `<div class="item"><strong>${v.nombre}</strong><div style="font-size: 0.9em;">Tel: ${v.telefono}</div></div>`;
                });
                document.getElementById('lista-vendedoras').innerHTML = html || '<p>Sin vendedoras</p>';
            }
        }

        function logout() {
            sessionStorage.removeItem('kiosco_user');
            window.location.href = 'kiosco_login.html';
        }
    </script>
</body>
</html>
