<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscoControl - Vendedora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .menu-principal { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .menu-btn { padding: 20px; background: white; border: 2px solid #ecf0f1; border-radius: 12px; cursor: pointer; text-align: center; transition: all 0.3s; font-weight: 600; }
        .menu-btn:hover { border-color: #667eea; background: #f8f9ff; transform: translateY(-2px); }
        .menu-btn span { display: block; font-size: 2em; margin-bottom: 8px; }
        .screen { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: none; }
        .screen.active { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #2c3e50; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 6px; font-size: 1em; }
        .btn { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-success { background: #27ae60; }
        .card { background: #f8f9fa; border: 1px solid #ecf0f1; border-radius: 8px; padding: 15px; margin: 15px 0; }
        .card-content { display: flex; justify-content: space-between; }
        .card-value { font-size: 1.5em; font-weight: bold; color: #667eea; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 15px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .logout-btn { position: fixed; top: 20px; right: 20px; padding: 10px 15px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .back-btn { background: white; color: #667eea; border: 2px solid #667eea; }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">Salir</button>
    <div class="container">
        <div id="screen-menu" class="screen active">
            <div class="header">
                <h1 id="nombre-vendedora">Vendedora</h1>
                <p>👋 Bienvenida</p>
            </div>
            <div class="menu-principal">
                <button class="menu-btn" onclick="showScreen('inicio-turno')"><span>🕐</span>Inicio de Turno</button>
                <button class="menu-btn" onclick="showScreen('registrar-venta')"><span>💰</span>Registrar Venta</button>
                <button class="menu-btn" onclick="showScreen('cierre-turno')"><span>✅</span>Cierre de Turno</button>
                <button class="menu-btn" onclick="showScreen('mis-ventas')"><span>📊</span>Mis Ventas</button>
            </div>
        </div>

        <div id="screen-inicio-turno" class="screen">
            <button class="btn back-btn" onclick="showScreen('menu')">← Volver</button>
            <h2>🕐 Inicio de Turno</h2>
            <form onsubmit="iniciarTurno(event)">
                <div class="form-group">
                    <label>Fondo inicial</label>
                    <input type="number" id="fondo-inicial" placeholder="500" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-success">Confirmar</button>
            </form>
        </div>

        <div id="screen-registrar-venta" class="screen">
            <button class="btn back-btn" onclick="showScreen('menu')">← Volver</button>
            <h2>💰 Registrar Venta</h2>
            <div id="alert-venta"></div>
            <form onsubmit="registrarVenta(event)">
                <div class="form-group">
                    <label>Producto</label>
                    <select id="producto-select" required onchange="actualizarPrecio()">
                        <option value="">Selecciona...</option>
                        <option value="gaseosa">Gaseosa 2L - $300</option>
                        <option value="snacks">Snacks - $200</option>
                        <option value="cafe">Café - $150</option>
                        <option value="medialunas">Medialunas - $80</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cantidad</label>
                    <input type="number" id="cantidad" placeholder="1" min="1" required onchange="actualizarPrecio()">
                </div>
                <div class="form-group">
                    <label>Forma de Pago</label>
                    <select id="forma-pago" required>
                        <option value="">Selecciona...</option>
                        <option value="efectivo">Efectivo</option>
                        <option value="qr">QR</option>
                        <option value="transferencia">Transferencia</option>
                    </select>
                </div>
                <div class="card">
                    <div class="card-content">
                        <span>Subtotal:</span>
                        <span class="card-value" id="subtotal">$0</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Registrar</button>
            </form>
        </div>

        <div id="screen-cierre-turno" class="screen">
            <button class="btn back-btn" onclick="showScreen('menu')">← Volver</button>
            <h2>✅ Cierre de Caja</h2>
            <div class="card">
                <div class="card-content">
                    <span>Fondo Inicial:</span>
                    <span class="card-value" id="fondo-mostrar">$0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>Total Vendido:</span>
                    <span class="card-value" id="total-vendido">$0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>Total Esperado:</span>
                    <span class="card-value" id="total-esperado">$0</span>
                </div>
            </div>
            <form onsubmit="cerrarTurno(event)">
                <div class="form-group">
                    <label>Monto contado</label>
                    <input type="number" id="total-contado" placeholder="0" step="0.01" required>
                </div>
                <div id="resultado-cierre"></div>
                <button type="submit" class="btn btn-success">Cierre OK</button>
            </form>
        </div>

        <div id="screen-mis-ventas" class="screen">
            <button class="btn back-btn" onclick="showScreen('menu')">← Volver</button>
            <h2>📊 Mis Ventas</h2>
            <div id="lista-ventas"><p style="text-align: center;">Cargando...</p></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hd1xdajrbxmulzdgudu.supabase.co/rest/v1';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkaXhkYWpyYnhtdWx6ZGd1ZGZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTAzOTAsImV4cCI6MjA5ODI2NjM5MH0.GA5aGebX2fX_evHINng8TCzwlpdwMB1YqvX3tEefjU4';
        let userData = null;
        const precios = {gaseosa: 300, snacks: 200, cafe: 150, medialunas: 80};

        async function llamarSupabase(tabla, metodo = 'GET', datos = null, query = '') {
            try {
                let url = `${SUPABASE_URL}/${tabla}`;
                if (query) url += `?${query}`;
                
                const opciones = {
                    method: metodo,
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    }
                };
                
                if (datos) opciones.body = JSON.stringify(datos);
                
                const res = await fetch(url, opciones);
                return await res.json();
            } catch (e) {
                console.error('Error:', e);
                return null;
            }
        }

        window.addEventListener('load', () => {
            userData = JSON.parse(sessionStorage.getItem('kiosco_user'));
            if (!userData || userData.rol !== 'vendedora') {
                window.location.href = 'kiosco_login.html';
                return;
            }
            document.getElementById('nombre-vendedora').textContent = userData.nombre;
        });

        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if (screen === 'menu') {
                document.getElementById('screen-menu').classList.add('active');
            } else {
                document.getElementById('screen-' + screen).classList.add('active');
                if (screen === 'mis-ventas') cargarVentas();
            }
        }

        function actualizarPrecio() {
            const producto = document.getElementById('producto-select').value;
            const cantidad = parseFloat(document.getElementById('cantidad').value) || 1;
            if (producto) {
                const subtotal = precios[producto] * cantidad;
                document.getElementById('subtotal').textContent = '$' + subtotal;
            }
        }

        function iniciarTurno(e) {
            e.preventDefault();
            const fondo = parseFloat(document.getElementById('fondo-inicial').value);
            localStorage.setItem('fondo_' + userData.id, fondo);
            alert('✅ Turno iniciado');
            showScreen('menu');
        }

        async function registrarVenta(e) {
            e.preventDefault();
            const producto = document.getElementById('producto-select').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const formaPago = document.getElementById('forma-pago').value;
            const precio = precios[producto];
            const subtotal = precio * cantidad;

            const resultado = await llamarSupabase('ventas', 'POST', {
                cliente_id: userData.cliente_id,
                vendedora_id: userData.id,
                producto_id: producto,
                cantidad,
                precio_unitario: precio,
                subtotal,
                forma_pago: formaPago,
                fecha_venta: new Date().toISOString()
            });

            if (resultado && !resultado.error) {
                document.getElementById('alert-venta').innerHTML = '<div class="alert alert-success">✅ Venta guardada en Supabase</div>';
                document.getElementById('producto-select').value = '';
                document.getElementById('cantidad').value = '';
                document.getElementById('forma-pago').value = '';
            } else {
                document.getElementById('alert-venta').innerHTML = '<div class="alert alert-error">❌ Error: ' + (resultado?.error || 'Desconocido') + '</div>';
            }
        }

        async function cargarVentas() {
            const hoy = new Date().toISOString().split('T')[0];
            const query = `vendedora_id=eq.${userData.id}&fecha_venta=gte.${hoy}T00:00:00`;
            const ventas = await llamarSupabase('ventas', 'GET', null, query);

            if (!ventas || ventas.error) {
                document.getElementById('lista-ventas').innerHTML = '<p>Sin ventas</p>';
                return;
            }

            const total = ventas.reduce((sum, v) => sum + v.subtotal, 0);
            let html = `<div class="card"><div class="card-content"><span>Total:</span><span class="card-value">$${total}</span></div></div>`;
            
            ventas.forEach(v => {
                html += `<div class="card"><div style="font-weight: 600;">${v.producto_id} x${v.cantidad}</div><div style="font-size: 0.9em; color: #7f8c8d;">$${v.subtotal}</div></div>`;
            });

            document.getElementById('lista-ventas').innerHTML = html;
        }

        function cerrarTurno(e) {
            e.preventDefault();
            const fondo = parseFloat(localStorage.getItem('fondo_' + userData.id)) || 0;
            const contado = parseFloat(document.getElementById('total-contado').value);
            
            document.getElementById('fondo-mostrar').textContent = '$' + fondo.toFixed(2);
            document.getElementById('total-esperado').textContent = '$' + fondo.toFixed(2);
            
            const diferencia = contado - fondo;
            const msg = diferencia === 0 ? 'perfecta' : 'diferencia: $' + diferencia.toFixed(2);
            document.getElementById('resultado-cierre').innerHTML = `<div class="alert alert-${diferencia === 0 ? 'success' : 'error'}">Caja ${msg}</div>`;
        }

        function logout() {
            sessionStorage.removeItem('kiosco_user');
            window.location.href = 'kiosco_login.html';
        }
    </script>
</body>
</html>
