<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscoControl - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 15px;
            background: none;
            border: none;
            color: #7f8c8d;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .card {
            background: #f8f9fa;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .card-content {
            display: flex;
            justify-content: space-between;
        }

        .card-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 1em;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-success {
            background: #27ae60;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }

        .estado-activo {
            background: #d4edda;
            color: #155724;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">Salir</button>

    <div class="container">
        <div class="header">
            <h1>👑 Super Admin</h1>
            <p>Gestión de KioscoControl</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('clientes')">🏢 Clientes</button>
            <button class="tab-btn" onclick="switchTab('usuarios')">👥 Usuarios</button>
            <button class="tab-btn" onclick="switchTab('reportes')">📊 Reportes</button>
        </div>

        <div id="clientes" class="tab-content active">
            <h2>🏢 Clientes</h2>
            <form onsubmit="crearCliente(event)">
                <div class="form-group">
                    <label>Nombre del Kiosco</label>
                    <input type="text" id="nombre" placeholder="Maxi Kiosco" required>
                </div>
                <div class="form-group">
                    <label>Dueño</label>
                    <input type="text" id="dueño" placeholder="Roberto García" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Plan ($/mes)</label>
                    <input type="number" id="plan" placeholder="5000" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-success">+ Crear Cliente</button>
            </form>

            <h3 style="margin-top: 30px; color: #2c3e50;">Clientes Activos:</h3>
            <div id="lista-clientes"><p>Cargando...</p></div>
        </div>

        <div id="usuarios" class="tab-content">
            <h2>👥 Usuarios</h2>
            <div id="lista-usuarios"><p>Cargando...</p></div>
        </div>

        <div id="reportes" class="tab-content">
            <h2>📊 Reportes</h2>
            <div class="card">
                <div class="card-content">
                    <span>Clientes Activos:</span>
                    <span class="card-value" id="total-clientes">0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>Usuarios Registrados:</span>
                    <span class="card-value" id="total-usuarios">0</span>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <span>Ingresos Mensuales:</span>
                    <span class="card-value" id="total-ingresos">$0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userData = null;

        async function callAPI(table, method = 'GET', data = null, query = null) {
            try {
                const response = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({table, method, data, query})
                });
                return await response.json();
            } catch(e) {
                console.error('Error:', e);
                return null;
            }
        }

        window.addEventListener('load', () => {
            userData = JSON.parse(sessionStorage.getItem('kiosco_user'));
            if (!userData || userData.rol !== 'super_admin') {
                window.location.href = 'kiosco_login.html';
                return;
            }
            cargarDatos();
            setInterval(cargarDatos, 10000);
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function cargarDatos() {
            const clientes = await callAPI('clientes', 'GET', null, 'select=*&order=id.desc');
            if (clientes && !clientes.error) {
                let html = '';
                clientes.forEach(c => {
                    html += `<div class="item"><strong>${c.nombre}</strong><div style="font-size: 0.9em; color: #7f8c8d;">${c.nombre_dueño} | $${c.monto_plan}/mes</div><span class="estado-activo">${c.estado}</span></div>`;
                });
                document.getElementById('lista-clientes').innerHTML = html || '<p>Sin clientes</p>';
                document.getElementById('total-clientes').textContent = clientes.length;
                document.getElementById('total-ingresos').textContent = '$' + clientes.reduce((s, c) => s + c.monto_plan, 0).toLocaleString('es-AR');
            }

            const usuarios = await callAPI('usuarios', 'GET', null, 'select=*&order=id.desc');
            if (usuarios && !usuarios.error) {
                let html = '';
                usuarios.forEach(u => {
                    html += `<div class="item"><strong>${u.nombre}</strong><div style="font-size: 0.9em; color: #7f8c8d;">Rol: ${u.rol}</div></div>`;
                });
                document.getElementById('lista-usuarios').innerHTML = html || '<p>Sin usuarios</p>';
                document.getElementById('total-usuarios').textContent = usuarios.length;
            }
        }

        async function crearCliente(e) {
            e.preventDefault();
            const result = await callAPI('clientes', 'POST', {
                nombre: document.getElementById('nombre').value,
                nombre_dueño: document.getElementById('dueño').value,
                email_dueño: document.getElementById('email').value,
                monto_plan: parseFloat(document.getElementById('plan').value),
                estado: 'activo',
                fecha_proximo_pago: new Date(Date.now() + 30*24*60*60*1000).toISOString()
            });

            if (result && !result.error) {
                alert('✅ Cliente creado');
                document.getElementById('nombre').value = '';
                document.getElementById('dueño').value = '';
                document.getElementById('email').value = '';
                document.getElementById('plan').value = '';
                cargarDatos();
            } else {
                alert('❌ Error');
            }
        }

        function logout() {
            sessionStorage.removeItem('kiosco_user');
            window.location.href = 'kiosco_login.html';
        }
    </script>
</body>
</html>
