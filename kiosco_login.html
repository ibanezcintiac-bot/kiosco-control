<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscoControl - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .logo-section p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .login-box.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .login-box p {
            color: #7f8c8d;
            font-size: 0.85em;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ecf0f1;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #7f8c8d;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9em;
            animation: slideIn 0.3s ease;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #ecf0f1;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .form-footer p {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85em;
        }

        .pin-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .pin-input {
            width: 50px;
            height: 50px;
            font-size: 1.5em;
            text-align: center;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-weight: bold;
        }

        .pin-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .version {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.8em;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 25px;
            }

            .logo-section h1 {
                font-size: 2em;
            }

            .tabs {
                flex-direction: column;
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 0.9em;
            }

            .pin-input {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <h1>🏪</h1>
            <h1>KioscoControl</h1>
            <p>Sistema de Gestión para Kioscos</p>
        </div>

        <div class="login-box active" id="login-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('cintia')">👑 Cintia</button>
                <button class="tab-btn" onclick="switchTab('dueño')">🏪 Dueño</button>
                <button class="tab-btn" onclick="switchTab('vendedora')">👩‍💼 Vendedora</button>
            </div>

            <!-- TAB: CINTIA (Super Admin) -->
            <div id="tab-cintia" class="tab-content active">
                <h2>Panel Super Admin</h2>
                <p>Acceso exclusivo para Cintia</p>
                <div id="alert-cintia"></div>

                <form id="form-cintia" onsubmit="loginCintia(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="cintia-email" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="cintia-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn" id="btn-cintia">Ingresar</button>
                </form>
            </div>

            <!-- TAB: DUEÑO -->
            <div id="tab-dueño" class="tab-content" style="display: none;">
                <h2>Panel Dueño</h2>
                <p>Gestión de tu kiosco</p>
                <div id="alert-dueño"></div>

                <form id="form-dueño" onsubmit="loginDueño(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="dueño-email" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="dueño-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn" id="btn-dueño">Ingresar</button>
                </form>
            </div>

            <!-- TAB: VENDEDORA -->
            <div id="tab-vendedora" class="tab-content" style="display: none;">
                <h2>Registro de Vendedora</h2>
                <p>Ingresa tus datos para comenzar</p>
                <div id="alert-vendedora"></div>

                <form id="form-vendedora" onsubmit="loginVendedora(event)">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="vendedora-tel" placeholder="Ej: 3411234567" required>
                    </div>

                    <div class="form-group">
                        <label>PIN (4 dígitos)</label>
                        <input type="password" id="vendedora-pin" placeholder="••••" maxlength="4" inputmode="numeric" required>
                    </div>

                    <button type="submit" class="btn" id="btn-vendedora">Ingresar</button>
                </form>

                <div class="form-footer">
                    <p>👉 Pregunta tu PIN al dueño si no lo tienes</p>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Verificando datos...</p>
            </div>
        </div>

        <div class="version">
            v1.0 - KioscoControl 2026
        </div>
    </div>

    <script>
        // CONFIG - CAMBIAR ESTOS VALORES
        const SUPABASE_URL = 'https://hd1xdajrbxmulzdgudu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkaXhkYWpyYnhtdWx6ZGd1ZGZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTAzOTAsImV4cCI6MjA5ODI2NjM5MH0.GA5aGebX2fX_evHINng8TCzwlpdwMB1YqvX3tEefjU4';

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.style.display = 'none';
            });

            // Remove active from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById('tab-' + tab).style.display = 'block';
            event.target.classList.add('active');

            // Clear alerts
            document.getElementById('alert-cintia').innerHTML = '';
            document.getElementById('alert-dueño').innerHTML = '';
            document.getElementById('alert-vendedora').innerHTML = '';
        }

        function showAlert(containerId, message, type) {
            const alertDiv = document.getElementById(containerId);
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        // LOGIN CINTIA
        async function loginCintia(e) {
            e.preventDefault();
            const email = document.getElementById('cintia-email').value;
            const password = document.getElementById('cintia-password').value;

            showLoading(true);

            try {
                // Buscar usuario con email y rol super_admin
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/usuarios?email=eq.${encodeURIComponent(email)}&rol=eq.super_admin&select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                const usuarios = await response.json();

                if (!usuarios || usuarios.length === 0) {
                    showAlert('alert-cintia', '❌ Email o contraseña incorrectos', 'error');
                    showLoading(false);
                    return;
                }

                const usuario = usuarios[0];

                // Verificar estado
                if (usuario.estado !== 'activo') {
                    showAlert('alert-cintia', '❌ Tu cuenta está inactiva', 'error');
                    showLoading(false);
                    return;
                }

                // Guardar sesión (en una app real, usar Supabase Auth)
                sessionStorage.setItem('kiosco_user', JSON.stringify({
                    id: usuario.id,
                    nombre: usuario.nombre,
                    rol: usuario.rol,
                    email: email
                }));

                showAlert('alert-cintia', '✅ Acceso concedido. Redirigiendo...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard-admin.html';
                }, 1500);

            } catch (error) {
                showAlert('alert-cintia', '❌ Error de conexión: ' + error.message, 'error');
                showLoading(false);
            }
        }

        // LOGIN DUEÑO
        async function loginDueño(e) {
            e.preventDefault();
            const email = document.getElementById('dueño-email').value;
            const password = document.getElementById('dueño-password').value;

            showLoading(true);

            try {
                // Buscar dueño por email
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/usuarios?email=eq.${encodeURIComponent(email)}&rol=eq.dueño&select=*,clientes(*)`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                const usuarios = await response.json();

                if (!usuarios || usuarios.length === 0) {
                    showAlert('alert-dueño', '❌ Email o contraseña incorrectos', 'error');
                    showLoading(false);
                    return;
                }

                const usuario = usuarios[0];

                // Verificar si usuario está activo
                if (usuario.estado !== 'activo') {
                    showAlert('alert-dueño', '❌ Tu cuenta está inactiva', 'error');
                    showLoading(false);
                    return;
                }

                // Verificar si su cliente está activo
                const cliente = usuario.clientes;
                if (cliente && cliente.estado !== 'activo') {
                    showAlert('alert-dueño', '⚠️ Tu suscripción ha vencido. Contacta a Soluciones IC', 'error');
                    showLoading(false);
                    return;
                }

                sessionStorage.setItem('kiosco_user', JSON.stringify({
                    id: usuario.id,
                    nombre: usuario.nombre,
                    rol: usuario.rol,
                    email: email,
                    cliente_id: usuario.cliente_id
                }));

                showAlert('alert-dueño', '✅ Acceso concedido. Redirigiendo...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard-dueño.html';
                }, 1500);

            } catch (error) {
                showAlert('alert-dueño', '❌ Error de conexión: ' + error.message, 'error');
                showLoading(false);
            }
        }

        // LOGIN VENDEDORA
        async function loginVendedora(e) {
            e.preventDefault();
            const telefono = document.getElementById('vendedora-tel').value;
            const pin = document.getElementById('vendedora-pin').value;

            showLoading(true);

            try {
                // Buscar vendedora por teléfono
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/usuarios?telefono=eq.${encodeURIComponent(telefono)}&rol=eq.vendedora&select=*,clientes(estado)`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                const usuarios = await response.json();

                if (!usuarios || usuarios.length === 0) {
                    showAlert('alert-vendedora', '❌ Teléfono no encontrado', 'error');
                    showLoading(false);
                    return;
                }

                const usuario = usuarios[0];

                // Verificar PIN
                if (usuario.pin !== pin) {
                    showAlert('alert-vendedora', '❌ PIN incorrecto', 'error');
                    showLoading(false);
                    return;
                }

                // Verificar si usuario está activo
                if (usuario.estado !== 'activo') {
                    showAlert('alert-vendedora', '❌ Tu cuenta está inactiva', 'error');
                    showLoading(false);
                    return;
                }

                // Verificar si su cliente está activo
                const cliente = usuario.clientes;
                if (cliente && cliente.estado !== 'activo') {
                    showAlert('alert-vendedora', '⚠️ El kiosco no puede operar en este momento', 'error');
                    showLoading(false);
                    return;
                }

                sessionStorage.setItem('kiosco_user', JSON.stringify({
                    id: usuario.id,
                    nombre: usuario.nombre,
                    rol: usuario.rol,
                    telefono: telefono,
                    cliente_id: usuario.cliente_id
                }));

                showAlert('alert-vendedora', '✅ Acceso concedido. Redirigiendo...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard-vendedora.html';
                }, 1500);

            } catch (error) {
                showAlert('alert-vendedora', '❌ Error de conexión: ' + error.message, 'error');
                showLoading(false);
            }
        }

        // Verificar si ya está logueado
        window.addEventListener('load', () => {
            const user = sessionStorage.getItem('kiosco_user');
            if (user) {
                const userData = JSON.parse(user);
                // Redirigir según rol
                if (userData.rol === 'super_admin') {
                    window.location.href = '/dashboard-admin.html';
                } else if (userData.rol === 'dueño') {
                    window.location.href = '/dashboard-dueño.html';
                } else if (userData.rol === 'vendedora') {
                    window.location.href = '/dashboard-vendedora.html';
                }
            }
        });
    </script>
</body>
</html>
