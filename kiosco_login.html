<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscoControl - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-section h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .logo-section p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .login-box p {
            color: #7f8c8d;
            font-size: 0.85em;
            margin-bottom: 25px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ecf0f1;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 15px;
            background: none;
            border: none;
            color: #7f8c8d;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .form-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85em;
        }

        .version {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.8em;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 25px;
            }

            .logo-section h1 {
                font-size: 2em;
            }

            .tabs {
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 12px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <h1>🏪</h1>
            <h1>KioscoControl</h1>
            <p>Sistema de Gestión para Kioscos</p>
        </div>

        <div class="login-box">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'vendedora')">👩‍💼 Vendedora</button>
                <button class="tab-btn" onclick="switchTab(event, 'dueño')">🏪 Dueño</button>
                <button class="tab-btn" onclick="switchTab(event, 'cintia')">👑 Cintia</button>
            </div>

            <div id="vendedora" class="tab-content active">
                <h2>Registro de Vendedora</h2>
                <p>Ingresa tus datos para comenzar</p>
                <div id="alert-vendedora"></div>
                <form onsubmit="loginVendedora(event)">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="vendedora-tel" placeholder="3411234567" value="3411234567" required>
                    </div>
                    <div class="form-group">
                        <label>PIN (4 dígitos)</label>
                        <input type="password" id="vendedora-pin" placeholder="••••" maxlength="4" value="1234" required>
                    </div>
                    <button type="submit" class="btn">Ingresar</button>
                </form>
                <div class="form-footer">
                    <p>👉 Pregunta tu PIN al dueño si no lo tienes</p>
                </div>
            </div>

            <div id="dueño" class="tab-content">
                <h2>Panel Dueño</h2>
                <p>Gestión de tu kiosco</p>
                <div id="alert-dueño"></div>
                <form onsubmit="loginDueño(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="dueño-email" placeholder="tu@email.com" value="roberto@maxikiosco.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="dueño-password" placeholder="••••••••" value="test123" required>
                    </div>
                    <button type="submit" class="btn">Ingresar</button>
                </form>
            </div>

            <div id="cintia" class="tab-content">
                <h2>Panel Super Admin</h2>
                <p>Acceso exclusivo para Cintia</p>
                <div id="alert-cintia"></div>
                <form onsubmit="loginCintia(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="cintia-email" placeholder="cintia@solucionesic.com" value="cintia@solucionesic.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="cintia-password" placeholder="••••••••" value="test123" required>
                    </div>
                    <button type="submit" class="btn">Ingresar</button>
                </form>
            </div>
        </div>

        <div class="version">
            v1.0 - KioscoControl 2026
        </div>
    </div>

    <script>
        const usuarios = {
            vendedoras: [
                { nombre: 'Mariana', telefono: '3411234567', pin: '1234', cliente_id: 'maxi-kiosco', estado: 'activo' },
                { nombre: 'Valeria', telefono: '3415678901', pin: '5678', cliente_id: 'maxi-kiosco', estado: 'activo' },
                { nombre: 'Paula', telefono: '3419876543', pin: '9012', cliente_id: 'maxi-kiosco', estado: 'activo' },
                { nombre: 'Sofía', telefono: '3412345678', pin: '3456', cliente_id: 'kiosco-paz', estado: 'activo' }
            ],
            dueños: [
                { nombre: 'Roberto García', email: 'roberto@maxikiosco.com', password: 'test123', cliente_id: 'maxi-kiosco', estado: 'activo' },
                { nombre: 'María López', email: 'maria@kiosclopaz.com', password: 'test123', cliente_id: 'kiosco-paz', estado: 'activo' }
            ],
            admins: [
                { nombre: 'Cintia Ibañez', email: 'cintia@solucionesic.com', password: 'test123', estado: 'activo' }
            ],
            clientes: {
                'maxi-kiosco': { nombre: 'Maxi Kiosco', estado: 'activo' },
                'kiosco-paz': { nombre: 'Kiosco La Paz', estado: 'activo' }
            }
        };

        function switchTab(e, tab) {
            e.preventDefault();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            e.target.classList.add('active');
        }

        function showAlert(id, msg, type) {
            document.getElementById(id).innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        }

        function loginVendedora(e) {
            e.preventDefault();
            const tel = document.getElementById('vendedora-tel').value;
            const pin = document.getElementById('vendedora-pin').value;
            const user = usuarios.vendedoras.find(u => u.telefono === tel && u.pin === pin);

            if (!user) {
                showAlert('alert-vendedora', '❌ Teléfono o PIN incorrecto', 'error');
                return;
            }

            sessionStorage.setItem('kiosco_user', JSON.stringify({nombre: user.nombre, rol: 'vendedora', cliente_id: user.cliente_id}));
            showAlert('alert-vendedora', '✅ Acceso concedido. Redirigiendo...', 'success');
            setTimeout(() => { window.location.href = 'dashboard_vendedora.html'; }, 1500);
        }

        function loginDueño(e) {
            e.preventDefault();
            const email = document.getElementById('dueño-email').value;
            const password = document.getElementById('dueño-password').value;
            const user = usuarios.dueños.find(u => u.email === email && u.password === password);

            if (!user) {
                showAlert('alert-dueño', '❌ Email o contraseña incorrectos', 'error');
                return;
            }

            sessionStorage.setItem('kiosco_user', JSON.stringify({nombre: user.nombre, rol: 'dueño', cliente_id: user.cliente_id}));
            showAlert('alert-dueño', '✅ Acceso concedido. Redirigiendo...', 'success');
            setTimeout(() => { window.location.href = 'dashboard_dueño.html'; }, 1500);
        }

        function loginCintia(e) {
            e.preventDefault();
            const email = document.getElementById('cintia-email').value;
            const password = document.getElementById('cintia-password').value;
            const user = usuarios.admins.find(u => u.email === email && u.password === password);

            if (!user) {
                showAlert('alert-cintia', '❌ Email o contraseña incorrectos', 'error');
                return;
            }

            sessionStorage.setItem('kiosco_user', JSON.stringify({nombre: user.nombre, rol: 'super_admin'}));
            showAlert('alert-cintia', '✅ Acceso concedido. Redirigiendo...', 'success');
            setTimeout(() => { window.location.href = 'dashboard-admin.html'; }, 1500);
        }
    </script>
</body>
</html>
